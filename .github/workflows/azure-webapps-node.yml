function renderBarChart(){
  const vals=[4,9,6,14,8,12,11];
  const max=Math.max(...vals);
  const days=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  document.getElementById('barChart').innerHTML=vals.map((v,i)=>{
    const h=(v/max*100).toFixed(0);
    const op=0.35+(v/max)*0.65;
    return `<div class="bar" style="height:${h}%;background:rgba(0,245,255,${op})" onclick="toast('${days[i]}: ${v} commits','inf')"></div>`;
  }).join('');
}

function renderLangBars(){
  const langs=[{n:'JavaScript',p:42,cls:'pf-g'},{n:'Python',p:31,cls:'pf-c'},{n:'HTML/CSS',p:27,cls:'pf-n'}];
  document.getElementById('langBars').innerHTML=langs.map(l=>`
    <div class="pw">
      <div class="pl"><span style="font-size:12px">${l.n}</span><span style="font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--dim)">${l.p}%</span></div>
      <div class="pb"><div class="pf ${l.cls}" style="width:${l.p}%"></div></div>
    </div>`).join('');
}

// ══════════════════════════════════════════
// KEYBOARD
// ══════════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeModal();
  if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();runQuery();}
});
document.getElementById('modal').addEventListener('click',e=>{
  if(e.target===document.getElementById('modal'))closeModal();
});

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
renderRepos();
renderCommits();
renderPipeline();
renderWebhooks();
renderBarChart();
renderLangBars();
updateBadge();
updateAuthView();
addLog('cmd','$ nexus-walls --env=production --watch');
addLog('ok','System ready. Waiting for trigger...');
</script>
</body>
