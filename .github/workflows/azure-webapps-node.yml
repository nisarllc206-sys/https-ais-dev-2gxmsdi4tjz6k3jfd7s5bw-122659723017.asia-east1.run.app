function renderPipeline(){
  const el=document.getElementById('pipeEl');
  const stages=['SOURCE','BUILD','TEST','DEPLOY','VERIFY','LIVE'];
  const icons=['⧉','⛭','⬡','⇪','⊠','◉'];
  el.innerHTML='';
  stages.forEach((name,i)=>{
    const st=S.pipeState[i];
    const cls=st===1?'done':st===2?'run':st===3?'fail':'idle';
    const icon=st===1?'✓':st===2?'⟳':st===3?'✕':icons[i];
    el.innerHTML+=`<div class="pstep"><div class="pc ${cls}" id="pc${i}">${icon}</div><div class="plbl">${name}</div></div>`;
    if(i<stages.length-1)el.innerHTML+=`<div class="pconn ${st===1?'done':''}" id="pl${i}"></div>`;
  });
}

function setBar(barId,pctId,pct){
  document.getElementById(barId).style.width=pct+'%';
  document.getElementById(pctId).textContent=pct+'%';
}

function animBar(barId,pctId,from,to,ms){
  const steps=ms/16;const step=(to-from)/steps;let cur=from;
  const iv=setInterval(()=>{
    cur=Math.min(cur+step,to);
    document.getElementById(barId).style.width=Math.round(cur)+'%';
    document.getElementById(pctId).textContent=Math.round(cur)+'%';
    if(cur>=to)clearInterval(iv);
  },16);
}

function addLog(type,msg){
  const t=new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  S.logLines.push({type,msg,t});
  const el=document.getElementById('deployLog');
  const cls={ok:'lok',inf:'linf',warn:'lwrn',err:'lerr',cmd:'lcmd'};
  el.innerHTML+=`<div class="ll"><span class="lt">[${t}]</span><span class="${cls[type]||'linf'}">${msg}</span></div>`;
  el.scrollTop=el.scrollHeight;
}

function clearLog(){
  S.logLines=[];
  document.getElementById('deployLog').innerHTML='';
}

function triggerDeploy(){
  if(!S.connected){toast('Connect GitHub first!','err');return;}
  if(S.deploying){toast('Deploy already running!','warn');return;}
  S.deploying=true;
  const btn=document.getElementById('trigBtn');
  btn.classList.add('ld');btn.disabled=true;
  S.pipeState=[0,0,0,0,0,0];
  renderPipeline();clearLog();
  setBar('bbar','bpct',0);setBar('dbar','dpct',0);setBar('tbar','tpct',0);
  document.getElementById('pStatus').className='bdg bc2';
  document.getElementById('pStatus').textContent='⟳ RUNNING';
  S.deploys++;
  countTo('s-deploys',S.deploys,400);

  const seq=[
    {d:200,fn:()=>{S.pipeState[0]=1;renderPipeline();animBar('bbar','bpct',0,100,600);addLog('ok','Source pulled: nexus-walls-frontend@'+Math.random().toString(16).substr(2,7));}},
    {d:1000,fn:()=>{S.pipeState[1]=2;renderPipeline();addLog('inf','Installing dependencies...');}},
    {d:2000,fn:()=>{S.pipeState[1]=1;renderPipeline();addLog('ok','npm install complete (234 packages)');animBar('tbar','tpct',0,94,700);addLog('ok','Tests passed: 47/50');addLog('warn','3 tests skipped (integration)');}},
    {d:3000,fn:()=>{S.pipeState[2]=1;renderPipeline();addLog('ok','Build complete — 2.3MB gzipped');addLog('inf','Deploying to Netlify CDN...');}},
    {d:3800,fn:()=>{S.pipeState[3]=2;renderPipeline();addLog('inf','Uploading assets...');animBar('dbar','dpct',0,100,2400);}},
    {d:6300,fn:()=>{S.pipeState[3]=1;S.pipeState[4]=2;renderPipeline();addLog('ok','24/24 edge nodes updated');addLog('inf','Running health checks...');}},
    {d:7200,fn:()=>{S.pipeState[4]=1;S.pipeState[5]=2;renderPipeline();addLog('ok','Health check passed');}},
    {d:7900,fn:()=>{
      S.pipeState[5]=1;renderPipeline();
      addLog('ok','✓ DEPLOYMENT COMPLETE 🚀');
      document.getElementById('pStatus').className='bdg bn2';
      document.getElementById('pStatus').textContent='● LIVE';
      document.getElementById('eprod').textContent='just now';
      document.getElementById('epbld').textContent='#'+(38+S.deploys);
      document.getElementById('sd-dep').textContent='+'+Math.min(S.deploys-38,9)+' today';
      S.deploying=false;
      btn.classList.remove('ld');btn.disabled=false;
      toast('Deployment LIVE on nexuswalls.com 🚀','ok');
    }},
  ];
  seq.forEach(s=>setTimeout(s.fn,s.d));
}

