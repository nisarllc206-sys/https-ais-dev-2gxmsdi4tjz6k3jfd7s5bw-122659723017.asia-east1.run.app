// ══════════════════════════════════════════
function countTo(id,target,ms=700){
  const el=document.getElementById(id);
  const start=parseInt(el.textContent)||0;
  const step=(target-start)/(ms/16);
  let cur=start;
  const iv=setInterval(()=>{
    cur+=step;
    if((step>0&&cur>=target)||(step<0&&cur<=target)){cur=target;clearInterval(iv);}
    el.textContent=Math.round(cur);
  },16);
}

