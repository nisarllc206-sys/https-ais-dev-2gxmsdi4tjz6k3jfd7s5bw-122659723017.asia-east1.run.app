  document.getElementById('apiMeth').value='GET';
}

function onApiType(){
  const t=document.getElementById('apiType').value;
  document.getElementById('apiEp').value=t==='graphql'
    ?'{ viewer { login repositories(first:5) { nodes { name } } } }'
    :'/user/repos?per_page=5&sort=updated';
}

function runQuery(){
  if(!S.connected){toast('Connect GitHub first!','err');return;}
  const btn=document.getElementById('runBtn');
  const ep=document.getElementById('apiEp').value.trim();
  btn.classList.add('ld');btn.disabled=true;
  document.getElementById('apiResp').innerHTML='<div class="ll"><span class="lwrn">// Fetching...</span></div>';
  document.getElementById('apiBadge').style.display='none';
  const t0=Date.now();
  setTimeout(()=>{
    btn.classList.remove('ld');btn.disabled=false;
    const data=MOCK[ep]||{status:200,message:'OK',endpoint:ep,timestamp:new Date().toISOString()};
    S.apiData=data;
    const ms=Date.now()-t0;
    renderJson(data);
    const b=document.getElementById('apiBadge');
    b.className='bdg bn2';b.textContent='200 OK';b.style.display='inline-flex';
    document.getElementById('apiMeta').textContent=ms+'ms · '+JSON.stringify(data).length+' bytes';
    toast('Query complete!','ok','▶');
  },400+Math.random()*300);
}

function renderJson(data){
  const json=JSON.stringify(data,null,2);
  const h=json
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"([^"]+)":/g,'<span class="json-k">"$1"</span>:')
    .replace(/: "([^"]*)"/g,': <span class="json-s">"$1"</span>')
    .replace(/: (\d+\.?\d*)/g,': <span class="json-n">$1</span>')
    .replace(/: (true|false|null)/g,': <span class="json-b">$1</span>');
  document.getElementById('apiResp').innerHTML='<pre style="white-space:pre-wrap;word-break:break-all;font-family:\'Share Tech Mono\',monospace;font-size:11px">'+h+'</pre>';
}

function clearResp(){
  S.apiData=null;
  document.getElementById('apiResp').innerHTML='<div class="ll"><span class="linf">// Cleared.</span></div>';
  document.getElementById('apiBadge').style.display='none';
  document.getElementById('apiMeta').textContent='';
}

function copyResp(){
  if(!S.apiData){toast('Nothing to copy!','warn');return;}
  navigator.clipboard.writeText(JSON.stringify(S.apiData,null,2)).catch(()=>{});
  toast('JSON copied!','inf','⎘');
}

function dlResp(){
  if(!S.apiData){toast('Nothing to download!','warn');return;}
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(S.apiData,null,2)],{type:'application/json'}));
  a.download='github-response.json';a.click();
  toast('Downloading...','inf','↓');
}

